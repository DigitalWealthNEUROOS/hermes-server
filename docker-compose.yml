services:
  minio:
    image: minio/minio:latest
    container_name: hermes-minio
    command: server /data --address ':9000' --console-address ':9001'
    environment:
      MINIO_ROOT_USER: hermes
      MINIO_ROOT_PASSWORD: hermes_minio_2026
    volumes:
      - /home/codespace/hermes/data/minio:/data
    restart: unless-stopped
    networks:
      - hermes-net

  mariadb:
    image: mariadb:11
    container_name: hermes-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: hermes_db_2026
    volumes:
      - /home/codespace/hermes/data/mariadb:/var/lib/mysql
    restart: unless-stopped
    networks:
      - hermes-net

  postgres:
    image: pgvector/pgvector:pg17
    container_name: hermes-postgres
    environment:
      POSTGRES_PASSWORD: hermes_pg_2026
    volumes:
      - /home/codespace/hermes/data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - hermes-net

  redis:
    image: redis:7-alpine
    container_name: hermes-redis
    command: redis-server --requirepass hermes_redis_2026
    volumes:
      - /home/codespace/hermes/data/redis:/data
    restart: unless-stopped
    networks:
      - hermes-net

  directus:
    image: directus/directus:latest
    container_name: hermes-directus
    environment:
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: postgres
      DB_PASSWORD: hermes_pg_2026
      SECRET: hermes_secret_2026
      ADMIN_EMAIL: hermes@localhost
      ADMIN_PASSWORD: hermes_admin_2026
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge
