services:
  minio:
    image: minio/minio:latest
    container_name: hermes-minio
    command: server /data --address ':9000' --console-address ':9001'
    environment:
      MINIO_ROOT_USER: hermes
      MINIO_ROOT_PASSWORD: hermes_minio_2026
    volumes:
      - /home/codespace/hermes/data/minio:/data
    restart: unless-stopped
    networks:
      - hermes-net

  mariadb:
    image: mariadb:11
    container_name: hermes-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: hermes_db_2026
    volumes:
      - /home/codespace/hermes/data/mariadb:/var/lib/mysql
      - /home/codespace/hermes/sql/mariadb-init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - hermes-net

  postgres:
    image: pgvector/pgvector:pg17
    container_name: hermes-postgres
    environment:
      POSTGRES_PASSWORD: hermes_pg_2026
    volumes:
      - /home/codespace/hermes/data/postgres:/var/lib/postgresql/data
      - /home/codespace/hermes/sql/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - hermes-net

  redis:
    image: redis:7-alpine
    container_name: hermes-redis
    command: redis-server --requirepass hermes_redis_2026
    volumes:
      - /home/codespace/hermes/data/redis:/data
    restart: unless-stopped
    networks:
      - hermes-net

  nextcloud:
    image: nextcloud:latest
    container_name: hermes-nextcloud
    environment:
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud_2026
      NEXTCLOUD_ADMIN_USER: hermes
      NEXTCLOUD_ADMIN_PASSWORD: hermes_admin_2026
    volumes:
      - /home/codespace/hermes/data/nextcloud:/var/www/html
    depends_on:
      - mariadb
    restart: unless-stopped
    networks:
      - hermes-net

  openvas:
    image: mikesplain/openvas:latest
    container_name: hermes-openvas
    volumes:
      - /home/codespace/hermes/data/openvas:/data
    restart: unless-stopped
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge
